<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>INTERCONTINENTAL • LIQUID GOLD ENGINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #FFD700;
    --liquid-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    --blue: #00e5ff;
    --red: #ff0033;
}

body {
    margin: 0;
    background: radial-gradient(circle, #1a1a1a, #000);
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

/* Efeito de Shake Sutil */
.shake-effect {
    animation: shake 0.1s infinite;
}
@keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    50% { transform: translate(-1px, -1px) rotate(-0.2deg); }
    100% { transform: translate(1px, -1px) rotate(0deg); }
}

/* Moldura de Ouro Líquido */
.frame {
    width: 1100px;
    background: var(--liquid-gold);
    padding: 15px;
    position: relative;
    border-radius: 50px 100px 50px 120px;
    box-shadow: 0 0 50px rgba(191, 149, 63, 0.4);
    /* Criando o aspecto "escorrendo" com filtros */
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

/* Deck Interior */
.deck {
    background: #080808;
    border-radius: 40px 90px 40px 110px;
    padding: 40px;
    box-shadow: inset 0 0 50px #000;
    border: 1px solid rgba(255, 215, 0, 0.2);
}

.lcd {
    background: #000;
    color: #00ff55;
    font-family: 'Share Tech Mono';
    padding: 15px;
    border-radius: 12px;
    border: 1px solid var(--gold);
    box-shadow: 0 0 15px rgba(0, 255, 85, 0.2);
}

/* Espectro e Visualização */
#engine {
    width: 100%;
    height: 300px;
    filter: drop-shadow(0 0 10px var(--blue));
}

/* KNOB COLORIDO */
.knob {
    width: 180px; height: 180px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(255, 215, 0, 0.3);
    cursor: ns-resize;
    transition: transform 0.1s;
}
.knob-inner {
    width: 100%; height: 100%;
    background: #111;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid #222;
}
.knob span { font-size: 42px; font-weight: 900; text-shadow: 0 0 10px #fff; }

/* VU */
.vu-bar { height: 12px; background: #111; border-radius: 5px; overflow: hidden; border: 1px solid #333; }
.vu-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ff41, #fbff00, #ff0000); }

/* BOTOES */
.eq-btn { background: #111; border: 1px solid #444; padding: 10px 4px; border-radius: 4px; font-size: 10px; transition: 0.3s; }
.eq-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

.nitro-active {
    animation: nitro-glow 0.5s infinite alternate;
    background: #ff0033 !important;
}
@keyframes nitro-glow {
    from { box-shadow: 0 0 5px #ff0033; transform: scale(1); }
    to { box-shadow: 0 0 30px #ff0033; transform: scale(1.05); }
}

.theme-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 5px; font-size: 10px; padding: 5px;
}
</style>
</head>

<body>
<div class="frame" id="mainFrame">
    <div class="deck">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-5xl font-black italic text-yellow-500 drop-shadow-lg">INTERCONTINENTAL</h1>
                <p class="text-[10px] tracking-[0.8em] text-yellow-200 opacity-50">LIQUID GOLD • DIGITAL ENGINE</p>
            </div>
            <div class="lcd w-72">
                <div class="flex justify-between border-b border-green-900 mb-1">
                    <span id="clockDisplay" class="text-xl">00:00:00</span>
                    <span id="dateDisplay" class="text-[10px] self-center">--/--/----</span>
                </div>
                <div class="flex justify-between text-[10px] font-bold">
                    <span id="statusTxt">ENGINE: OFF</span>
                    <span id="modeTxt">MODE: STOCK</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-3 flex flex-col gap-4">
                <div class="space-y-2">
                    <div class="vu-bar"><div id="vu1" class="vu-fill"></div></div>
                    <div class="vu-bar"><div id="vu2" class="vu-fill"></div></div>
                    <div class="vu-bar"><div id="vu3" class="vu-fill"></div></div>
                </div>
                <div class="grid gap-4 mt-4">
                    <div class="relative h-20 bg-black rounded-full border border-yellow-600/30 overflow-hidden">
                        <div id="n1" class="absolute bottom-0 left-1/2 w-1 h-16 bg-red-600 origin-bottom -translate-x-1/2"></div>
                        <p class="absolute bottom-1 w-full text-center text-[9px] text-yellow-500">PRESSURE</p>
                    </div>
                    <div class="relative h-20 bg-black rounded-full border border-cyan-600/30 overflow-hidden">
                        <div id="n2" class="absolute bottom-0 left-1/2 w-1 h-16 bg-cyan-400 origin-bottom -translate-x-1/2"></div>
                        <p class="absolute bottom-1 w-full text-center text-[9px] text-cyan-400">RPM</p>
                    </div>
                </div>
            </div>

            <div class="col-span-6 flex flex-col gap-6">
                <canvas id="engine"></canvas>
                
                <div class="grid grid-cols-4 gap-3">
                    <button id="playBtn" class="bg-zinc-900 border border-green-500/50 hover:bg-green-600 py-5 rounded-lg font-black transition">START</button>
                    <button id="pauseBtn" class="bg-zinc-900 border border-red-500/50 hover:bg-red-600 py-5 rounded-lg font-black transition">STOP</button>
                    <button id="muteBtn" class="bg-zinc-900 border border-zinc-500/50 py-5 rounded-lg font-black transition">MUTE</button>
                    <button id="nitroBtn" class="bg-red-950 border border-red-500 py-5 rounded-lg font-black transition">NITRO</button>
                </div>

                <div class="grid grid-cols-7 gap-1">
                    <button class="eq-btn active" onclick="setMode('STOCK', this)">STOCK</button>
                    <button class="eq-btn" onclick="setMode('ECO', this)">ECO</button>
                    <button class="eq-btn" onclick="setMode('SPORT', this)">SPORT</button>
                    <button class="eq-btn" onclick="setMode('CITY', this)">CITY</button>
                    <button class="eq-btn" onclick="setMode('TURBO', this)">TURBO</button>
                    <button class="eq-btn" onclick="setMode('VOICE', this)">VOICE</button>
                    <button class="eq-btn" onclick="setMode('NIGHT', this)">NIGHT</button>
                </div>
            </div>

            <div class="col-span-3 flex flex-col items-center gap-4">
                <div class="knob" id="knobControl">
                    <div class="knob-inner"><span id="volDisplay">80</span></div>
                </div>
                
                <div class="w-full bg-black/50 p-3 rounded-xl border border-yellow-700/20">
                    <p class="text-center text-[10px] text-yellow-500 mb-2">ENGINE PAINT SHOP</p>
                    <div class="grid grid-cols-5 gap-1 max-h-32 overflow-y-auto pr-1">
                        <script>
                            for(let i=1; i<=25; i++) document.write(`<button class="theme-btn" onclick="setTheme(${i})">${i}</button>`);
                        </script>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const RADIO_URL = "https://stream.zeno.fm/wzcgaal0dnltv";
const audio = new Audio(RADIO_URL);
audio.crossOrigin = "anonymous";

let audioCtx, analyser, source, nitroGain, dataArray;
let lowFilter, midFilter, highFilter;
let isNitro = false;
let currentVol = 80;

async function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512; // Aumentado para barras mais detalhadas
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        lowFilter = audioCtx.createBiquadFilter();
        lowFilter.type = 'lowshelf'; lowFilter.frequency.value = 250;
        
        midFilter = audioCtx.createBiquadFilter();
        midFilter.type = 'peaking'; midFilter.frequency.value = 1000;
        
        highFilter = audioCtx.createBiquadFilter();
        highFilter.type = 'highshelf'; highFilter.frequency.value = 4000;

        nitroGain = audioCtx.createGain();
        nitroGain.gain.value = 1.0;

        source = audioCtx.createMediaElementSource(audio);
        source.connect(nitroGain).connect(lowFilter).connect(midFilter).connect(highFilter).connect(analyser).connect(audioCtx.destination);
    }
}

playBtn.onclick = async () => {
    await initAudio();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    audio.play();
    statusTxt.innerText = "ENGINE: RUNNING";
    animate();
};

pauseBtn.onclick = () => { audio.pause(); statusTxt.innerText = "ENGINE: STOPPED"; };
muteBtn.onclick = () => { audio.muted = !audio.muted; muteBtn.style.borderColor = audio.muted ? 'red' : ''; };

nitroBtn.onclick = () => {
    if(!audioCtx) return;
    isNitro = !isNitro;
    nitroBtn.classList.toggle("nitro-active", isNitro);
    nitroGain.gain.setTargetAtTime(isNitro ? 2.5 : 1.0, audioCtx.currentTime, 0.2);
    statusTxt.innerText = isNitro ? "NITRO: ACTIVE" : "ENGINE: RUNNING";
};

function animate() {
    requestAnimationFrame(animate);
    if(!analyser) return;
    analyser.getByteFrequencyData(dataArray);

    const canvas = document.getElementById('engine');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Espectro de Barras Neon Detalhado
    const barWidth = (canvas.width / dataArray.length) * 2.5;
    let barHeight;
    let x = 0;

    // Detectar grave para o Shake
    let bassSum = dataArray[1] + dataArray[2] + dataArray[3];
    if(bassSum > (isNitro ? 500 : 650)) {
        mainFrame.classList.add('shake-effect');
    } else {
        mainFrame.classList.remove('shake-effect');
    }

    for(let i = 0; i < dataArray.length; i++) {
        barHeight = dataArray[i] / 1.5;
        let r = i * 2;
        let g = 255 - (i * 3);
        let b = 255;
        
        ctx.fillStyle = isNitro ? `rgb(255, ${255-barHeight}, 0)` : `rgb(${r}, ${g}, ${b})`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = isNitro ? 'red' : 'cyan';
        
        // Desenha barra superior e inferior espelhada
        ctx.fillRect(x, (canvas.height/2) - barHeight/2, barWidth - 1, barHeight);
        x += barWidth;
    }

    // VU e Agulhas
    vu1.style.width = (dataArray[2] / 255 * 100) + "%";
    vu2.style.width = (dataArray[10] / 255 * 100) + "%";
    vu3.style.width = (dataArray[20] / 255 * 100) + "%";
    n1.style.transform = `translateX(-50%) rotate(${(dataArray[5]/255)*160 - 80}deg)`;
    n2.style.transform = `translateX(-50%) rotate(${(dataArray[15]/255)*160 - 80}deg)`;
}

knobControl.onwheel = (e) => {
    e.preventDefault();
    currentVol = e.deltaY < 0 ? Math.min(100, currentVol + 5) : Math.max(0, currentVol - 5);
    audio.volume = currentVol / 100;
    volDisplay.innerText = currentVol;
    knobControl.style.transform = `rotate(${currentVol * 3.6}deg)`;
};

function setMode(m, btn) {
    if(!audioCtx) return;
    document.querySelectorAll(".eq-btn").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    modeTxt.innerText = "MODE: " + m;
    
    lowFilter.gain.value = 0; midFilter.gain.value = 0; highFilter.gain.value = 0;
    if(m==='TURBO'){ lowFilter.gain.value = 15; highFilter.gain.value = 8; }
    if(m==='SPORT'){ lowFilter.gain.value = 7; highFilter.gain.value = 7; }
    if(m==='VOICE'){ midFilter.gain.value = 12; }
    if(m==='NIGHT'){ lowFilter.gain.value = 8; highFilter.gain.value = -10; }
}

function setTheme(n) {
    mainFrame.style.filter = `hue-rotate(${n * 15}deg) brightness(${1 + n/60})`;
}

setInterval(() => {
    const d = new Date();
    clockDisplay.innerText = d.toLocaleTimeString();
    dateDisplay.innerText = d.toLocaleDateString();
}, 1000);
</script>
</body>
</html>
