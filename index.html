<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>INTERCONTINENTAL • GOLDEN ENGINE V4.2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold-bright: #fff9d0;
            --gold-main: #ffd700;
            --gold-deep: #b8860b;
            --neon-blue: #00e5ff;
            --neon-pink: #ff00ff;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #333 0%, #000 100%);
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0 80px 0;
        }

        /* --- CHASSI COM MAIS LUZ --- */
        .chassis {
            width: 95%;
            max-width: 1200px;
            background: linear-gradient(135deg, #444, #999, #444); /* Brilho metálico mais claro */
            padding: 15px;
            border-radius: 50px;
            border: 3px solid var(--gold-main);
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(255,255,255,0.5);
            position: relative;
        }

        .inner-deck {
            background: rgba(15, 15, 15, 0.95);
            border-radius: 40px;
            padding: 35px;
            border: 2px solid var(--gold-deep);
            box-shadow: inset 0 0 50px #000;
        }

        .lcd-v4 {
            background: #111;
            border: 2px solid var(--gold-main);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 10px #000;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Share Tech Mono';
        }

        /* --- MEDIDORES DE AGULHA --- */
        .gauge-box {
            width: 130px; height: 75px;
            background: #000;
            border: 2px solid var(--gold-main);
            border-radius: 70px 70px 5px 5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px var(--gold-main);
        }
        .needle {
            position: absolute; bottom: 5px; left: 50%;
            width: 2px; height: 60px;
            background: #ff0000;
            transform-origin: bottom center;
            transform: rotate(-70deg);
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 5px #ff0000;
        }

        /* --- BARRAS DE LED --- */
        .led-bar {
            width: 100%; height: 12px;
            background: #111; border-radius: 10px;
            border: 1px solid #333; overflow: hidden;
        }
        .led-fill {
            height: 100%; width: 0%;
            background: linear-gradient(to right, #0f0, #ff0, #f00);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        /* --- BOTOES --- */
        .btn-core {
            background: linear-gradient(to bottom, #444, #111);
            border: 2px solid var(--gold-main);
            border-radius: 10px;
            font-weight: 900;
            transition: 0.2s;
            text-shadow: 0 0 5px #000;
        }
        .btn-core:hover { background: var(--gold-main); color: #000; box-shadow: 0 0 20px var(--gold-main); }
        .active-mode { background: var(--gold-main); color: #000; box-shadow: 0 0 25px var(--gold-main); }

        /* --- NOTICIAS --- */
        .ticker-v4 {
            position: fixed; bottom: 0; width: 100%;
            background: #000; border-top: 4px solid #f00;
            height: 60px; display: flex; align-items: center; z-index: 1000;
        }
        .ticker-label { background: #f00; padding: 0 25px; font-weight: 900; height: 100%; display: flex; align-items: center; }
        .ticker-move { 
            display: flex; white-space: nowrap; 
            animation: moveTicker 35s linear infinite; /* Velocidade média balanceada */
        }
        .ticker-move:hover { animation-play-state: paused; }
        @keyframes moveTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .theme-btn { border: 1px solid var(--gold-dark); background: #222; color: var(--gold-main); width: 35px; height: 35px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .theme-btn:hover { background: #fff; color: #000; }
    </style>
</head>

<body>

<div class="chassis" id="playerFrame">
    <div class="inner-deck">
        
        <!-- CABEÇALHO -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-5xl lg:text-6xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-white to-yellow-600 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">
                    INTERCONTINENTAL
                </h1>
                <p class="text-[11px] tracking-[0.7em] text-yellow-400 font-bold">GOLDEN ENGINE V4.2 PREMIUM</p>
            </div>

            <div class="lcd-v4 w-full md:w-80">
                <div class="flex justify-between border-b border-yellow-500/30 pb-1 mb-1">
                    <span id="clockDisplay" class="text-3xl font-bold text-yellow-500">00:00:00</span>
                    <span id="dateDisplay" class="text-[10px] self-end opacity-70">09/05/2026</span>
                </div>
                <div class="flex justify-between text-[11px] font-black uppercase text-yellow-600">
                    <span id="statusTxt">ENGINE: READY</span>
                    <span id="modeTxt">STOCK MODE</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- ESQUERDA: AGULHAS E TEMAS -->
            <div class="lg:col-span-3 flex flex-col gap-6 items-center">
                <div class="bg-black/50 p-4 rounded-2xl border border-yellow-500/20 w-full">
                    <p class="text-[9px] text-center mb-4 text-yellow-500 font-bold uppercase tracking-widest">Analog Telemetry</p>
                    <div class="flex flex-col gap-4 items-center">
                        <div class="gauge-box"><div id="needle1" class="needle"></div><p class="absolute bottom-1 w-full text-center text-[8px] text-yellow-600">BASS BOOST</p></div>
                        <div class="gauge-box"><div id="needle2" class="needle" style="background:#00e5ff"></div><p class="absolute bottom-1 w-full text-center text-[8px] text-yellow-600">PRESSURE</p></div>
                        <div class="gauge-box"><div id="needle3" class="needle" style="background:#ff00ff"></div><p class="absolute bottom-1 w-full text-center text-[8px] text-yellow-600">RPM FREQ</p></div>
                    </div>
                </div>

                <div class="bg-black/50 p-4 rounded-2xl border border-yellow-500/20 w-full">
                    <p class="text-[9px] text-center mb-2 text-yellow-500 font-bold uppercase">Engine Finish</p>
                    <div class="grid grid-cols-5 gap-1 justify-items-center">
                        <script>
                            for(let i=1; i<=25; i++) {
                                document.write(`<button class="theme-btn" onclick="setTheme(${i*14})">${i}</button>`);
                            }
                        </script>
                    </div>
                </div>
            </div>

            <!-- CENTRO: CANVAS E CONTROLES -->
            <div class="lg:col-span-6 space-y-6">
                <div class="bg-black rounded-3xl border-2 border-yellow-500/40 overflow-hidden relative shadow-[0_0_40px_rgba(0,0,0,1)]">
                    <canvas id="engineCanvas" class="w-full h-[350px]"></canvas>
                </div>

                <div class="space-y-3">
                    <div class="led-bar"><div id="bar1" class="led-fill"></div></div>
                    <div class="led-bar"><div id="bar2" class="led-fill" style="background:linear-gradient(to right, #00e5ff, #fff)"></div></div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button id="playBtn" class="btn-core py-5 text-green-400">START</button>
                    <button id="pauseBtn" class="btn-core py-5 text-red-500">STOP</button>
                    <button id="muteBtn" class="btn-core py-5">MUTE</button>
                    <button id="nitroBtn" class="btn-core py-5 text-yellow-500">NITRO</button>
                </div>

                <div class="flex flex-wrap justify-center gap-2">
                    <button class="btn-core px-4 py-2 active-mode" onclick="setMode('STOCK', this)">STOCK</button>
                    <button class="btn-core px-4 py-2" onclick="setMode('TURBO', this)">TURBO</button>
                    <button class="btn-core px-4 py-2" onclick="setMode('VOICE', this)">VOICE</button>
                    <button class="btn-core px-4 py-2" onclick="setMode('NIGHT', this)">NIGHT</button>
                </div>
            </div>

            <!-- DIREITA: VOLUME E ECOSYSTEM -->
            <div class="lg:col-span-3 flex flex-col items-center gap-8">
                <div class="relative group">
                    <div id="volWheel" class="w-40 h-40 rounded-full bg-gradient-to-tr from-black via-gray-800 to-black border-8 border-black shadow-[0_15px_40px_rgba(0,0,0,0.8)] cursor-pointer flex items-center justify-center">
                        <span id="volDisplay" class="text-5xl font-black text-yellow-500 drop-shadow-lg">80</span>
                        <div class="absolute inset-0 rounded-full border-4 border-yellow-500/20"></div>
                    </div>
                    <p class="text-center text-[10px] font-bold text-yellow-500 mt-4 tracking-widest uppercase">Master Volume</p>
                </div>

                <div class="w-full grid grid-cols-2 gap-2">
                    <a href="https://intercontinental-web-radio.webnode.page/contato/" target="_blank" class="p-3 text-[9px] font-black text-center border border-blue-500 text-blue-400 bg-blue-500/5 rounded-lg hover:bg-blue-500 hover:text-white transition">CONTATO</a>
                    <a href="https://www.youtube.com/@RadioWebintercontinental" target="_blank" class="p-3 text-[9px] font-black text-center border border-red-500 text-red-500 bg-red-500/5 rounded-lg hover:bg-red-500 hover:text-white transition">YOUTUBE</a>
                    <a href="https://sites.google.com/view/vox-i-a/in%C3%ADcio" target="_blank" class="p-3 text-[9px] font-black text-center border border-green-500 text-green-400 bg-green-500/5 rounded-lg hover:bg-green-500 hover:text-white transition">VOX I.A</a>
                    <a href="https://sites.google.com/view/dynac-x-play-intercontinental/in%C3%ADcio" target="_blank" class="p-3 text-[9px] font-black text-center border border-purple-500 text-purple-400 bg-purple-500/5 rounded-lg hover:bg-purple-500 hover:text-white transition">DYNAC</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="ticker-v4">
    <div class="ticker-label text-white">INTERCONTINENTAL NOTÍCIAS</div>
    <div class="ticker-wrapper overflow-hidden flex-1">
        <div class="ticker-move" id="newsBox">
            <span class="px-10 text-white font-bold">/// Sincronizando sistema de notícias...</span>
        </div>
    </div>
</div>

<script>
    const STREAM_URL = "https://stream.zeno.fm/wzcgaal0dnltv";
    const audio = new Audio(STREAM_URL);
    audio.crossOrigin = "anonymous";

    let audioCtx, analyser, source, nitroGain, dataArray, biquad;
    let currentVol = 80;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            biquad = audioCtx.createBiquadFilter();
            nitroGain = audioCtx.createGain();
            source = audioCtx.createMediaElementSource(audio);
            
            source.connect(biquad);
            biquad.connect(nitroGain);
            nitroGain.connect(analyser);
            analyser.connect(audioCtx.destination);
        }
    }

    playBtn.onclick = async () => {
        await initAudio();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        audio.play();
        statusTxt.innerText = "ENGINE: RUNNING";
        animate();
    };

    pauseBtn.onclick = () => { audio.pause(); statusTxt.innerText = "ENGINE: STOPPED"; };
    
    function setTheme(hue) {
        document.getElementById('playerFrame').style.filter = `hue-rotate(${hue}deg)`;
    }

    function setMode(m, btn) {
        if(!audioCtx) return;
        document.querySelectorAll('.btn-core').forEach(b => b.classList.remove('active-mode'));
        btn.classList.add('active-mode');
        modeTxt.innerText = m + " MODE";
        biquad.type = (m === 'TURBO') ? "lowshelf" : "peaking";
        biquad.gain.value = (m === 'TURBO') ? 15 : 0;
    }

    nitroBtn.onclick = () => {
        if(!audioCtx) return;
        const active = nitroBtn.classList.toggle('active-mode');
        nitroGain.gain.setTargetAtTime(active ? 2.2 : 1.0, audioCtx.currentTime, 0.1);
        statusTxt.innerText = active ? "NITRO: ENGAGED" : "ENGINE: RUNNING";
    };

    volWheel.onwheel = (e) => {
        e.preventDefault();
        currentVol = e.deltaY < 0 ? Math.min(100, currentVol + 5) : Math.max(0, currentVol - 5);
        audio.volume = currentVol / 100;
        volDisplay.innerText = currentVol;
        volWheel.style.transform = `rotate(${currentVol * 3.6}deg)`;
    };

    function animate() {
        requestAnimationFrame(animate);
        if(!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const cx = canvas.width / 2, cy = canvas.height / 2;

        // Visualizador Central
        dataArray.forEach((v, i) => {
            const angle = (i / dataArray.length) * Math.PI * 2;
            const len = v * 0.7;
            ctx.strokeStyle = `hsl(${(i * 5)}, 100%, 50%)`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * 70, cy + Math.sin(angle) * 70);
            ctx.lineTo(cx + Math.cos(angle) * (70 + len), cy + Math.sin(angle) * (70 + len));
            ctx.stroke();
        });

        // Movimento das Agulhas
        needle1.style.transform = `rotate(${(dataArray[5] / 255) * 140 - 70}deg)`;
        needle2.style.transform = `rotate(${(dataArray[15] / 255) * 140 - 70}deg)`;
        needle3.style.transform = `rotate(${(dataArray[40] / 255) * 140 - 70}deg)`;

        // Movimento das Barras LED
        bar1.style.width = (dataArray[10] / 255 * 100) + "%";
        bar2.style.width = (dataArray[25] / 255 * 100) + "%";
    }

    setInterval(() => {
        const d = new Date();
        clockDisplay.innerText = d.toLocaleTimeString();
    }, 1000);

    async function getNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt-419')}`);
            const data = await res.json();
            const news = data.items.map(i => `<span class="px-12 text-white text-lg"><span class="text-red-600">█</span> ${i.title}</span>`).join("");
            document.getElementById('newsBox').innerHTML = news + news;
        } catch(e) { }
    }
    getNews();
</script>

</body>
</html>
