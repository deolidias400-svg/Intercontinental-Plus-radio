<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora SUPERNOVA • Intercontinental</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:Segoe UI,Arial;
color:white;
background:radial-gradient(circle at center,#000000,#101018,#000000);
overflow:hidden;
text-align:center;
padding:20px;
}

/* topo */
#date-time{
font-size:18px;
color:#FFD700;
text-shadow:0 0 12px #FFD700;
margin-bottom:8px;
}

#status{
font-size:18px;
margin-bottom:6px;
}

#status-light{
display:inline-block;
width:16px;
height:16px;
border-radius:50%;
margin-left:8px;
box-shadow:0 0 15px red;
}

#listener-count{
font-size:18px;
color:#FFD700;
text-shadow:0 0 10px rgba(255,215,0,0.7);
margin-bottom:12px;
}

/* SOL */
.layout-container{
position:relative;
width:860px;
height:860px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;

background:
radial-gradient(circle,
#ffffff 0%,
#fff6a0 12%,
#ffd700 25%,
#ffb300 40%,
#ff6a00 60%,
#ff2a00 78%,
#120010 100%);

box-shadow:
0 0 150px rgba(255,215,0,1),
0 0 320px rgba(255,140,0,0.9),
0 0 600px rgba(255,60,0,0.8);

animation:sunPulse 5s infinite alternate;
transition:0.6s ease;
}

/* brilho pulsante do sol */
@keyframes sunPulse{
0%{
filter:saturate(1.2) brightness(1.05);
box-shadow:
0 0 140px rgba(255,215,0,1),
0 0 300px rgba(255,140,0,0.9),
0 0 520px rgba(255,60,0,0.8);
}
100%{
filter:saturate(1.7) brightness(1.25);
box-shadow:
0 0 220px rgba(255,215,0,1),
0 0 420px rgba(255,140,0,0.95),
0 0 800px rgba(255,60,0,0.9);
}
}

/* ANEL TEC */
.layout-container::before{
content:"";
position:absolute;
width:1020px;
height:1020px;
border-radius:50%;
border:3px solid rgba(255,255,255,0.12);
box-shadow:0 0 30px rgba(255,215,0,0.8), inset 0 0 25px rgba(255,140,0,0.6);
animation:spin 18s linear infinite;
opacity:0.7;
z-index:1;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* ========================= */
/* CHAMAS SOLARES (VISÍVEIS) */
/* ========================= */

.flame-layer{
position:absolute;
width:130%;
height:130%;
border-radius:50%;
z-index:2;
pointer-events:none;
mix-blend-mode:screen;
filter:blur(12px);
opacity:0.95;
}

.flame1{
background:conic-gradient(
from 0deg,
rgba(255,255,255,0),
rgba(255,220,0,0.6),
rgba(255,90,0,0.95),
rgba(255,0,80,0.7),
rgba(255,140,0,0.95),
rgba(255,255,255,0)
);
animation:flameSpin1 4s linear infinite, flamePulse 1.5s ease-in-out infinite alternate;
}

.flame2{
width:140%;
height:140%;
opacity:0.8;
filter:blur(16px);
background:conic-gradient(
from 180deg,
rgba(255,255,255,0),
rgba(255,120,0,0.8),
rgba(255,0,0,0.9),
rgba(255,200,0,0.85),
rgba(255,0,120,0.7),
rgba(255,255,255,0)
);
animation:flameSpin2 6s linear infinite reverse, flamePulse2 2s ease-in-out infinite alternate;
}

.flame3{
width:150%;
height:150%;
opacity:0.6;
filter:blur(22px);
background:conic-gradient(
from 90deg,
rgba(255,255,255,0),
rgba(255,220,0,0.7),
rgba(255,40,0,0.8),
rgba(255,0,160,0.75),
rgba(255,180,0,0.8),
rgba(255,255,255,0)
);
animation:flameSpin3 9s linear infinite, flamePulse3 2.2s ease-in-out infinite alternate;
}

@keyframes flameSpin1{
from{transform:rotate(0deg) scale(1.02);}
to{transform:rotate(360deg) scale(1.10);}
}

@keyframes flameSpin2{
from{transform:rotate(0deg) scale(1.05);}
to{transform:rotate(360deg) scale(1.18);}
}

@keyframes flameSpin3{
from{transform:rotate(0deg) scale(1.08);}
to{transform:rotate(360deg) scale(1.25);}
}

@keyframes flamePulse{
0%{opacity:0.65;}
100%{opacity:1;}
}

@keyframes flamePulse2{
0%{opacity:0.5;}
100%{opacity:0.95;}
}

@keyframes flamePulse3{
0%{opacity:0.35;}
100%{opacity:0.8;}
}

/* onda de choque */
.supernova-shockwave{
position:absolute;
width:140%;
height:140%;
border-radius:50%;
border:5px solid rgba(255,255,255,0.15);
box-shadow:0 0 60px rgba(255,255,255,0.3);
opacity:0;
transform:scale(0.4);
z-index:3;
pointer-events:none;
}

/* canvas */
canvas{
width:90%;
height:90%;
border-radius:50%;
position:relative;
z-index:5;
}

/* texto */
.outer-text{
margin-top:14px;
font-size:22px;
letter-spacing:1px;
}

.highlight{
color:#FFD700;
font-weight:bold;
text-shadow:0 0 12px #ffd700, 0 0 30px #ffae00;
}

/* botões */
.button-group{
display:flex;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
justify-content:center;
}

button{
font-size:18px;
padding:12px 26px;
border-radius:30px;
border:none;
cursor:pointer;
color:white;
background:linear-gradient(145deg,#111,#333);
box-shadow:0 0 10px rgba(255,255,255,0.3), inset 0 0 10px rgba(255,255,255,0.2);
transition:0.25s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,215,0,0.9), inset 0 0 12px rgba(255,215,0,0.7);
}

#play{background:linear-gradient(45deg,#00ff6a,#008f3c);}
#stop{background:linear-gradient(45deg,#ff0033,#7a0000);}

#boost{
background:linear-gradient(45deg,#00d9ff,#0040ff);
font-weight:bold;
}

#boost.active{
background:linear-gradient(45deg,#ff00ff,#ff4500);
box-shadow:0 0 35px rgba(255,0,200,0.95), 0 0 70px rgba(255,69,0,0.9);
transform:scale(1.12);
}

/* volume */
#volume-control{
display:flex;
align-items:center;
gap:12px;
margin-top:18px;
justify-content:center;
flex-wrap:wrap;
}

#volume-bar{
width:230px;
height:18px;
border-radius:20px;
background:linear-gradient(90deg,#00ff00,#ffff00,#ff0000);
box-shadow:0 0 14px rgba(255,215,0,0.7);
overflow:hidden;
}

#volume-level{
height:100%;
background:white;
width:50%;
border-radius:20px;
}

/* ============================= */
/* SUPERNOVA VISUAL + TREMOR     */
/* ============================= */

body.supernova-active{
animation:screenShake 0.12s infinite;
}

@keyframes screenShake{
0%{transform:translate(0px,0px);}
25%{transform:translate(2px,-2px);}
50%{transform:translate(-2px,2px);}
75%{transform:translate(2px,2px);}
100%{transform:translate(-2px,-2px);}
}

body.supernova-active .layout-container{
animation:sunPulseBoost 1.1s infinite alternate;
}

@keyframes sunPulseBoost{
0%{
filter:saturate(2.8) brightness(1.3);
transform:scale(1.06);
box-shadow:
0 0 250px rgba(255,255,255,1),
0 0 520px rgba(255,140,0,1),
0 0 1000px rgba(255,0,180,0.95);
}
100%{
filter:saturate(4.0) brightness(1.7);
transform:scale(1.14);
box-shadow:
0 0 400px rgba(255,255,255,1),
0 0 800px rgba(255,140,0,1),
0 0 1600px rgba(255,0,180,1);
}
}

body.supernova-active .supernova-shockwave{
animation:shockwave 1.2s ease-out infinite;
}

@keyframes shockwave{
0%{opacity:0.0; transform:scale(0.4);}
20%{opacity:0.9;}
100%{opacity:0; transform:scale(1.3);}
}

body.supernova-active .flame-layer{
filter:blur(10px) saturate(4);
opacity:1;
}

/* responsivo */
@media(max-width:900px){
.layout-container{
width:95vw;
height:95vw;
max-width:620px;
max-height:620px;
}
.layout-container::before{
width:120%;
height:120%;
}
.outer-text{font-size:18px;}
button{font-size:16px;padding:10px 20px;}
}
</style>
</head>

<body>

<div id="date-time">Carregando...</div>

<div id="status">
Status: <span id="status-text">Offline</span>
<span id="status-light" style="background:red;"></span>
</div>

<div id="listener-count">🎧 Ouvintes Online: 0</div>

<div class="layout-container" id="sun">
  <div class="flame-layer flame3"></div>
  <div class="flame-layer flame2"></div>
  <div class="flame-layer flame1"></div>
  <div class="supernova-shockwave"></div>
  <canvas id="spectrum"></canvas>
</div>

<div class="outer-text">
🌞 <span class="highlight">Aurora SUPERNOVA • Intercontinental</span> 🌞
</div>

<div class="button-group">
<button id="play">▶ Play</button>
<button id="stop">⏸ Pause</button>
<button id="boost">🚀 SUPER BOOST</button>
</div>

<div id="volume-control">
<button id="volume-down">-</button>
<div id="volume-bar"><div id="volume-level"></div></div>
<button id="volume-up">+</button>
</div>

<script>
const audioUrl = "https://stream.zeno.fm/wzcgaal0dnltv";
const audio = new Audio(audioUrl);
audio.crossOrigin = "anonymous";
audio.volume = 0.5;

let audioCtx = null;
let analyser = null;
let source = null;

let gainNode = null;
let distortion = null;

let isPlaying = false;
let boostMode = false;

const playButton = document.getElementById("play");
const stopButton = document.getElementById("stop");
const boostButton = document.getElementById("boost");

const volumeUpButton = document.getElementById("volume-up");
const volumeDownButton = document.getElementById("volume-down");
const volumeLevel = document.getElementById("volume-level");

const dateTimeDisplay = document.getElementById("date-time");
const statusText = document.getElementById("status-text");
const statusLight = document.getElementById("status-light");
const listenerCountDisplay = document.getElementById("listener-count");

const canvas = document.getElementById("spectrum");
const ctx = canvas.getContext("2d");

let bufferLength = 0;
let dataArray = null;

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(650, Math.floor(window.innerWidth * 0.85));

  canvas.style.width = size + "px";
  canvas.style.height = size + "px";

  canvas.width = Math.floor(size * dpr);
  canvas.height = Math.floor(size * dpr);

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* Distortion */
function makeDistortionCurve(amount) {
  const k = typeof amount === "number" ? amount : 50;
  const n_samples = 44100;
  const curve = new Float32Array(n_samples);
  const deg = Math.PI / 180;
  for (let i = 0; i < n_samples; i++) {
    const x = (i * 2) / n_samples - 1;
    curve[i] = ((3 + k) * x * 20 * deg) / (Math.PI + k * Math.abs(x));
  }
  return curve;
}

function initAudioSystem(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();

    // MAIS RÁPIDO E FLUIDO
    analyser.fftSize = 1024; 
    analyser.smoothingTimeConstant = 0.82;

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 1;

    distortion = audioCtx.createWaveShaper();
    distortion.curve = makeDistortionCurve(0);
    distortion.oversample = "4x";

    source = audioCtx.createMediaElementSource(audio);

    source.connect(gainNode);
    gainNode.connect(distortion);
    distortion.connect(analyser);
    analyser.connect(audioCtx.destination);

    bufferLength = analyser.frequencyBinCount;

    // reduzido para render mais leve e rápido
    dataArray = new Uint8Array(bufferLength);
  }
}

function updateStatus(online){
  statusText.textContent = online ? "Online" : "Offline";
  statusLight.style.background = online ? "lime" : "red";
  statusLight.style.boxShadow = online ? "0 0 18px lime" : "0 0 18px red";
}

function playAudio(){
  if(!isPlaying){
    initAudioSystem();

    audioCtx.resume().then(() => {
      audio.play().then(() => {
        isPlaying = true;
        updateStatus(true);
        renderSpectrum();
      }).catch(() => {
        alert("O navegador bloqueou o áudio. Clique novamente em Play.");
      });
    });
  }
}

function stopAudio(){
  if(isPlaying){
    audio.pause();
    isPlaying = false;
    updateStatus(false);
    clearCanvas();
  }
}

function adjustVolume(change){
  let newVolume = Math.min(1, Math.max(0, audio.volume + change));
  audio.volume = newVolume;
  volumeLevel.style.width = (newVolume * 100) + "%";
}

function clearCanvas(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* SUPER RENDER OTIMIZADO */
function renderSpectrum(){
  if(!isPlaying) return;

  analyser.getByteFrequencyData(dataArray);

  const w = canvas.width / (window.devicePixelRatio || 1);
  const h = canvas.height / (window.devicePixelRatio || 1);

  ctx.clearRect(0, 0, w, h);

  const centerX = w / 2;
  const centerY = h / 2;

  const baseRadius = boostMode ? 195 : 165;
  const intensity = boostMode ? 1.55 : 1.0;
  const lineWidth = boostMode ? 4 : 3;

  const step = boostMode ? 2 : 3; 
  const maxBars = Math.min(dataArray.length, 256);

  for(let i = 0; i < maxBars; i += step){

    const value = dataArray[i];
    const angle = (i / maxBars) * Math.PI * 2;

    const barHeight = value * intensity;

    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);

    const x1 = centerX + cosA * baseRadius;
    const y1 = centerY + sinA * baseRadius;

    const x2 = centerX + cosA * (baseRadius + barHeight);
    const y2 = centerY + sinA * (baseRadius + barHeight);

    ctx.strokeStyle = `hsl(${(i / maxBars) * 360}, 100%, ${boostMode ? 72 : 55}%)`;
    ctx.lineWidth = lineWidth;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  requestAnimationFrame(renderSpectrum);
}

function toggleBoost(){
  boostMode = !boostMode;

  if(boostMode){
    boostButton.classList.add("active");
    document.body.classList.add("supernova-active");

    gainNode.gain.value = 3.0;
    distortion.curve = makeDistortionCurve(140);

    audio.volume = 1.0;
    volumeLevel.style.width = "100%";

  } else {
    boostButton.classList.remove("active");
    document.body.classList.remove("supernova-active");

    gainNode.gain.value = 1;
    distortion.curve = makeDistortionCurve(0);

    audio.volume = 0.5;
    volumeLevel.style.width = "50%";
  }
}

function updateDateTime(){
  const now = new Date();
  const date = now.toLocaleDateString('pt-BR');
  const time = now.toLocaleTimeString('pt-BR');
  dateTimeDisplay.textContent = `Data: ${date} | Hora: ${time}`;
}

function fetchListenerCount(){
  listenerCountDisplay.textContent = `🎧 Ouvintes Online: ${Math.floor(Math.random() * 150) + 1}`;
}

/* eventos */
playButton.addEventListener("click", playAudio);
stopButton.addEventListener("click", stopAudio);
boostButton.addEventListener("click", toggleBoost);

volumeUpButton.addEventListener("click", () => adjustVolume(0.1));
volumeDownButton.addEventListener("click", () => adjustVolume(-0.1));

/* iniciar */
updateDateTime();
setInterval(updateDateTime, 1000);
setInterval(fetchListenerCount, 5000);
</script>

</body>
</html>
