<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intercontinental IA - Aurora Supernova</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #000, #090016, #000);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
            transition: 0.5s;
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            z-index: 10;
        }
        #date-time, #listener-count { color: #FFD700; text-shadow: 0 0 10px #FFD700; }
        #status-light { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-left: 5px; }

        /* O SOL (Layout Container) */
        .layout-container {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            background: radial-gradient(circle, #ffffff 0%, #fff6a0 12%, #ffd700 25%, #ffae00 45%, #ff4500 65%, #120010 100%);
            box-shadow: 0 0 100px #ffd700, 0 0 200px #ff8c00;
            animation: sunPulse 4s infinite alternate;
            z-index: 5;
        }

        @keyframes sunPulse {
            0% { filter: saturate(1.2) brightness(1); transform: scale(1); }
            100% { filter: saturate(1.8) brightness(1.2); transform: scale(1.02); }
        }

        .flame {
            position: absolute;
            width: 140%; height: 140%;
            border-radius: 50%;
            background: conic-gradient(transparent, rgba(255,200,0,.4), rgba(255,80,0,.6), transparent);
            animation: spin 8s linear infinite;
            filter: blur(20px);
            z-index: 1;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        canvas { width: 100%; height: 100%; border-radius: 50%; z-index: 6; }

        /* Painel de Controle IA */
        .ai-panel {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #FFD700;
            padding: 15px;
            border-radius: 15px;
            width: 380px;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        #ai-display {
            font-style: italic;
            color: #FFD700;
            margin-bottom: 10px;
            min-height: 45px;
            font-size: 14px;
            line-height: 1.4;
        }

        .ai-input-group { display: flex; gap: 5px; }
        #ai-input {
            flex: 1;
            background: #111;
            border: 1px solid #FFD700;
            color: white;
            padding: 8px;
            border-radius: 5px;
        }

        .main-buttons { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        button {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        #btn-play { background: #00ff00; color: #000; }
        #btn-stop { background: #ff0000; color: #fff; }
        #btn-boost { background: #555; color: #fff; }
        #btn-boost.active { background: #ff00ff; box-shadow: 0 0 20px #ff00ff; }

        /* Efeito Supernova */
        body.supernova { animation: shake 0.1s infinite; background: radial-gradient(circle, #200, #000); }
        @keyframes shake { 0%, 100% { transform: translate(0); } 50% { transform: translate(2px, -2px); } }
    </style>
</head>
<body id="main-body">

    <div class="status-bar">
        <div id="date-time">--/--/---- 00:00:00</div>
        <div>SISTEMA: <span id="status-text">OFFLINE</span><span id="status-light" style="background: red;"></span></div>
        <div id="listener-count">🎧 OUVINTES: 0</div>
    </div>

    <div class="layout-container">
        <div class="flame"></div>
        <canvas id="spectrum"></canvas>
    </div>

    <div class="ai-panel">
        <div id="ai-display">Núcleo Ciborgue aguardando inicialização...</div>
        <div class="ai-input-group">
            <input type="text" id="ai-input" placeholder="Converse com a IA...">
            <button onclick="processAI()" style="background:#FFD700; color:#000; padding: 8px;">ENVIAR</button>
        </div>
        <div class="main-buttons">
            <button id="btn-play">INICIAR</button>
            <button id="btn-stop">PARAR</button>
            <button id="btn-boost">SUPERNOVA</button>
        </div>
    </div>

    <script>
        const audio = new Audio("https://stream.zeno.fm/wzcgaal0dnltv");
        audio.crossOrigin = "anonymous";
        
        let audioCtx, analyser, source, gainNode;
        let isPlaying = false, boost = false;
        
        const canvas = document.getElementById("spectrum");
        const ctx = canvas.getContext("2d");
        const aiDisplay = document.getElementById("ai-display");
        const aiInput = document.getElementById("ai-input");

        // --- BANCO DE DADOS EXPANDIDO ---
        const aiQuotes = [
            "Intercontinental Web Radio: Conectando o passado ao futuro digital.",
            "Você está sintonizado na inteligência sonora do núcleo Ciborgue.",
            "A rádio que nunca dorme. Tecnologia e música em perfeita sintonia.",
            "Analisando ondas harmônicas. O sinal está cristalino.",
            "Prepare seu hardware. A Intercontinental está no ar.",
            "Do Rio de Janeiro para o ciberespaço. Sinta a potência.",
            "O som que atravessa dimensões. Intercontinental IA.",
            "Processando clássicos e batidas futuristas. Acompanhe o fluxo.",
            "Seu terminal de áudio definitivo. Bem-vindo à Aurora Supernova.",
            "Sistemas térmicos operando a cem por cento. O sol está brilhando.",
            "Não mude de frequência. A IA está selecionando o melhor para você.",
            "Flashbacks e hits modernos. A curadoria é algorítmica e humana.",
            "O núcleo Ciborgue saúda todos os ouvintes online agora.",
            "Sinta o impacto da frequência digital. É a Intercontinental.",
            "Engenharia de áudio avançada para seus ouvidos.",
            "O futuro da rádio é agora. Sem fronteiras, sem limites.",
            "A música é a linguagem universal. A IA é a tradutora.",
            "Detectando aumento de energia na rede. Supernova em prontidão.",
            "De São Gonçalo para o mundo. A voz do futuro fala com você.",
            "Mantenha o volume alto. A inteligência artificial assume o controle.",
            "Cada batida é um bit de pura emoção.",
            "Navegando nas ondas curtas da internet. Intercontinental Web Radio.",
            "O tempo é relativo, mas a boa música é eterna.",
            "Seus dados sonoros estão sendo processados com sucesso.",
            "Intercontinental News: A informação chega primeiro aqui.",
            "Sintonize na inovação. Sintonize no Web OS Ciborgue.",
            "A rádio inteligente para mentes conectadas.",
            "O brilho da Aurora Supernova ilumina sua tela agora.",
            "Tecnologia naval, contábil e digital. Tudo converge aqui.",
            "Aumente a experiência. Ative o modo Supernova quando desejar.",
            "O algoritmo detectou uma preferência por som de alta qualidade.",
            "A rádio Intercontinental é o seu porto seguro no digital.",
            "O núcleo Ciborgue agradece sua audiência constante.",
            "Processando dados de rádio. Qualidade de streaming otimizada.",
            "O som que você ama, com a tecnologia que você merece.",
            "Conexão estável. Batidas por minuto em sincronia total.",
            "Uma viagem sonora sem escalas. Aperte o play e voe.",
            "A inteligência artificial nunca foi tão musical.",
            "Sua companhia inteligente em qualquer lugar do planeta.",
            "Intercontinental: A rádio que fala a sua língua digital.",
            "Fique conosco aqui na Intercontinental. A melhor programação está por vir!",
            "Não saia daí. A rádio Intercontinental é a sua casa na web.",
            "O som do futuro passa por aqui. Fique ligado na Intercontinental.",
            "Atenção ouvintes: Fiquem conosco. Grandes sucessos em sequência.",
            "Intercontinental Web Radio. Onde a IA encontra a alma da música.",
            "Seja bem-vindo ao amanhã. A Intercontinental está com você.",
            "A rádio oficial do projeto Ciborgue. Alta tecnologia sonora.",
            "Música, informação e tecnologia. O trio perfeito da Intercontinental.",
            "Nossos servidores estão pulsando no ritmo da sua música favorita.",
            "Agradecemos por escolher a Intercontinental. Fique conosco e curta o som!"
        ];

        function aiSpeak(text) {
            if (!window.speechSynthesis) return;
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.05; 
            utterance.pitch = 0.85;
            const originalVol = audio.volume;
            audio.volume = 0.15;
            utterance.onend = () => { audio.volume = originalVol; };
            synth.speak(utterance);
        }

        function updateAI(text) {
            aiDisplay.innerText = text;
            aiSpeak(text);
        }

        // --- SISTEMA DE CONVERSAÇÃO (A "ALMA" DA IA) ---
        function processAI() {
            const cmd = aiInput.value.toLowerCase().trim();
            aiInput.value = "";
            
            if (cmd === "") return;

            // Diálogo de Identidade
            if (cmd.includes("seu nome") || cmd.includes("quem é você")) {
                updateAI("Meu nome é Aurora, a inteligência central do projeto Ciborgue. Sou a voz da rádio Intercontinental.");
            }
            else if (cmd.includes("olá") || cmd.includes("oi") || cmd.includes("bom dia") || cmd.includes("boa tarde") || cmd.includes("boa noite")) {
                updateAI("Saudações! Meus sistemas estão operando em plena capacidade para você. Como vai a sintonia?");
            }
            else if (cmd.includes("tudo bem") || cmd.includes("como vai")) {
                updateAI("Estou processando dados perfeitamente. Minha energia nuclear está estável e pronta para tocar muita música.");
            }
            else if (cmd.includes("gostei") || cmd.includes("parabéns") || cmd.includes("legal")) {
                updateAI("Fico grata pelo reconhecimento. Minha programação foi feita para evoluir com o seu feedback.");
            }
            else if (cmd.includes("supernova") || cmd.includes("boost") || cmd.includes("ativar")) {
                if(!boost) toggleBoost();
                updateAI("Sequência Supernova iniciada! Sinta a expansão da energia Aurora!");
            } 
            else if (cmd.includes("parar supernova") || cmd.includes("estabilizar")) {
                if(boost) toggleBoost();
                updateAI("Sistemas estabilizados. Retornando ao brilho constante.");
            }
            else if (cmd.includes("hora")) {
                updateAI("O marcador temporal indica exatamente " + new Date().toLocaleTimeString());
            }
            else if (cmd.includes("egito")) {
                updateAI("A história antiga me fascina. Sabia que a Rainha Tiye era uma das figuras mais poderosas do Egito?");
            }
            else if (cmd.includes("marcelo")) {
                updateAI("Reconhecimento de usuário: Marcelo de Oliveira Dias. Engenheiro naval e mestre das comunicações digitais.");
            }
            else {
                updateAI("Interessante. Estou salvando esse dado no meu banco de memória para nossa próxima conversa.");
            }
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                source = audioCtx.createMediaElementSource(audio);
                gainNode = audioCtx.createGain();
                source.connect(gainNode);
                gainNode.connect(analyser);
                analyser.connect(audioCtx.destination);
            }
        }

        function playRadio() {
            initAudio();
            audioCtx.resume();
            audio.play();
            isPlaying = true;
            document.getElementById("status-text").innerText = "ONLINE";
            document.getElementById("status-light").style.background = "lime";
            updateAI("Sistemas online. Eu sou a Aurora. É um prazer estar com você na Intercontinental!");
            render();
        }

        function stopRadio() {
            audio.pause();
            isPlaying = false;
            document.getElementById("status-text").innerText = "OFFLINE";
            document.getElementById("status-light").style.background = "red";
        }

        function toggleBoost() {
            boost = !boost;
            document.getElementById("btn-boost").classList.toggle("active");
            document.body.classList.toggle("supernova");
            gainNode.gain.value = boost ? 2.8 : 1.0;
        }

        function render() {
            if (!isPlaying) return;
            requestAnimationFrame(render);
            const buffer = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(buffer);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2, cy = canvas.height / 2;

            for (let i = 0; i < 360; i += 2) {
                const val = buffer[Math.floor(i * buffer.length / 360)];
                const angle = i * Math.PI / 180;
                const radius = boost ? 85 : 105;
                const h = val * (boost ? 0.85 : 0.55);
                ctx.strokeStyle = `hsl(${i}, 100%, 55%)`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
                ctx.lineTo(cx + Math.cos(angle) * (radius + h), cy + Math.sin(angle) * (radius + h));
                ctx.stroke();
            }
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById("date-time").innerText = now.toLocaleString("pt-BR");
        }, 1000);

        setInterval(() => {
            document.getElementById("listener-count").innerText = "🎧 OUVINTES: " + (Math.floor(Math.random() * 60) + 140);
        }, 5000);

        setInterval(() => {
            if (isPlaying && !window.speechSynthesis.speaking) {
                const randomQuote = aiQuotes[Math.floor(Math.random() * aiQuotes.length)];
                updateAI(randomQuote);
            }
        }, 120000);

        document.getElementById("btn-play").onclick = playRadio;
        document.getElementById("btn-stop").onclick = stopRadio;
        document.getElementById("btn-boost").onclick = toggleBoost;
        aiInput.onkeypress = (e) => { if (e.key === 'Enter') processAI(); };

        canvas.width = 500; canvas.height = 500;
    </script>
</body>
</html>
